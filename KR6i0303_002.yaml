body:
  text: 大唐三藏沙門義淨奉制譯分別三身品第三爾時虛空藏菩薩摩訶薩在大衆中從座而起偏袒右肩右膝著地合掌恭敬頂禮佛足以上微妙金寶之花寶幢幡蓋而為供養白佛言世尊云何菩薩摩訶薩於諸如來甚深祕密如法修行佛言善男子諦聽諦聽善思念之吾當為汝分別解説善男子一切如來有三種身云何為三一者化身二者應身三者法身如是三身具足攝受阿耨多羅三藐三菩提若正了知速出生死云何菩薩了知化身善男子如來昔在修行地中為一切衆生修種種法如是修習至修行滿修行力故得大自在自在力故隨衆生意隨衆生行隨衆生界悉皆了別不待時不過時處相應時相應行相應説法相應現種種身是名化身善男子云何菩薩了知應身謂諸如來為諸菩薩得通達故説於真諦為令解了生死涅槃是一味故為除身見衆生怖畏歡喜故為無邊佛法而作本故如實相應如如如如智本願力故是身得現具三十二相八十種好項背圓光是名應身善男子云何菩薩摩訶薩了知法身為除諸煩惱等障為具諸善法故唯有如如如如智是名法身前二種身是假名有此第三身是真實有為前二身而作根本何以故離法如如離無分別智一切諸佛無有別法一切諸佛智慧具足一切煩惱究竟滅盡得清淨佛地是故法如如如如智攝一切佛法復次善男子一切諸佛利益自他至於究竟自利益者是法如如利益他者是如如智能於自他利益之事而得自在成就種種無邊用故是故分別一切佛法有無量無邊種種差別善男子譬如依止妄想思惟説種種煩惱説種種業用説種種果報如是依法如如依如如智説種種佛法説種種獨覺法説種種聲聞法依法如如依如如智一切佛法自在成就是為第一不可思議譬如畫空作莊嚴具是難思議如是依法如如依如如智成就佛法亦難思議善男子云何法如如如如智二無分別而得自在事業成就善男子譬如如來入於涅槃願自在故種種事業皆得成就法如如如如智自在事成亦復如是復次菩薩摩訶薩入無心定依前願力從禪定起作衆事業如是二法無有分別自在事成善男子譬如日月無有分別亦如水鏡無有分別光明亦無分別三種和合得有影生如是法如如如如智亦無分別以願自在故衆生有感現應化身如日月影和合出現復次善男子譬如無量無邊水鏡依於光故空影得現種種異相空者即是無相善男子如是受化諸弟子等是法身影以願力故於二種身現種種相於法身地無有異相善男子依此二身一切諸佛説有餘涅槃依此法身説無餘涅槃何以故一切餘法究竟盡故依此三身一切諸佛説無住處涅槃為二身故不住涅槃離於法身無有別佛何故二身不住涅槃二身假名不實念念生滅不定住故數數出現以不定故法身不爾是故二身不住涅槃法身不二是故不住涅槃故依三身説無住涅槃善男子一切凡夫為三相故有縛有障遠離三身不至三身何者為三一者遍計所執相二者依他起相三者成就相如是諸相不能解故不能滅故不能淨故是故不得至於三身如是三相能解能滅能淨故是故諸佛具足三身善男子諸凡夫人未能除遣此三心故遠離三身不能得至何者為三一者起事心二者依根本心三者根本心依諸伏道起事心盡依法斷道依根本心盡依最勝道根本心盡起事心滅故得現化身依根本心滅故得顯應身根本心滅故得至法身是故一切如來具足三身善男子一切諸佛於第一身與諸佛同事於第二身與諸佛同意於第三身與諸佛同體善男子是初佛身隨衆生意有多種故現種種相是故説多第二佛身弟子一意故現一相是故説一第三佛身過一切種相非執相境界是故説名不一不二善男子是第一身依於應身得顯現故是第二身依於法身得顯現故是法身者是真實有無依處故善男子如是三身以有義故而説於常以有義故説於無常化身者恆轉法輪處處隨緣方便相續不斷絶故是故説常非是本故具足大用不顯現故説為無常應身者從無始來相續不斷一切諸佛不共之法能攝持故衆生無盡用亦無盡是故説常非是本故以具足用不顯現故説為無常法身者非是行法無有異相是根本故猶如虛空是故説常善男子離無分別智更無勝智離法如如無勝境界是法如如是慧如如是二種如如如如不一不異是故法身慧清淨故滅清淨故是二清淨是故法身具足清淨復次善男子分別三身有四種異有化身非應身有應身非化身有化身亦應身有非化身亦非應身何者化身非應身謂諸如來般涅槃後以願自在故隨緣利益是名化身何者應身非化身是地前身何者化身亦應身謂住有餘涅槃之身何者非化身非應身謂是法身善男子是法身者二無所有所顯現故何者名為二無所有於此法身相及相處二皆是無非有非無非一非異非數非非數非明非暗如是如如智不見相及相處不見非有非無不見非一非異不見非數非非數不見非明非暗是故當知境界清淨智慧清淨不可分別無有中間為滅道本故於此法身能顯如來種種事業善男子是身因緣境界處所果依於本難思議故若了此義是身即是大乘是如來性是如來藏依於此身得發初心修行地心而得顯現不退地心亦皆得現一生補處心金剛之心如來之心而悉顯現無量無邊如來妙法皆悉顯現依此法身不可思議摩訶三昧而得顯現依此法身得現一切大智是故二身依於三昧依於智慧而得顯現如此法身依於自體説常説我依大三昧故説於樂依於大智故説清淨是故如來常住自在安樂清淨依大三昧一切禪定首楞嚴等一切念處大法念等大慈大悲一切陀羅尼一切神通一切自在一切法平等攝受如是佛法悉皆出現依此大智十力四無所畏四無礙辨一百八十不共之法一切希有不可思議法悉皆顯現譬如依如意寶珠無量無邊種種珍寶悉皆得現如是依大三昧寶依大智慧寶能出種種無量無邊諸佛妙法善男子如是法身三昧智慧過一切相不著於相不可分別非常非斷是名中道雖有分別體無分別雖有三數而無三體不增不減猶如夢幻亦無所執亦無能執法體如如是解脫處過死王境越生死暗一切衆生不能修行所不能至一切諸佛菩薩之所住處善男子譬如有人願欲得金處處求覓遂得金礦既得礦已即便碎之擇取精者爐中銷鍊得清淨金隨意回轉作諸鐶釧種種嚴具雖有諸用金性不改復次善男子若善男子善女人求勝解脫修行世善得見如來及弟子衆得親近已白佛言世尊何者為善何者不善何者正修得清淨行諸佛如來及弟子衆見彼問時如是思惟是善男子善女人欲求清淨欲聽正法即便為説令其開悟彼既聞已正念憶持發心修行得精進力除懶惰障滅一切罪於諸學處離不尊重息掉悔心入於初地依初地心除利有情障得入二地於此地中除不逼惱障入於三地於此地中除心軟淨障入於四地於此地中除善方便障入於五地於此地中除見真俗障入於六地於此地中除見行相障入於七地於此地中除不見滅相障入於八地於此地中除不見生相障入於九地於此地中除六通障入於十地於此地中除所知障除根本心入如來地如來地者由三淨故名極清淨云何為三一者煩惱淨二者苦淨三者相淨譬如真金鎔銷治鍊既燒打已無復塵垢為顯金性本清淨故金體清淨非謂無金譬如濁水澄渟清淨無復滓穢為顯水性本清淨故非謂無水如是法身與煩惱離苦集除已無復餘習為顯佛性本清淨故非謂無體譬如虛空煙雲塵霧之所障蔽若除屏已是空界淨非謂無空如是法身一切衆苦悉皆盡故説為清淨非謂無體譬如有人於睡夢中見大河水漂泛其身運手動足截流而渡得至彼岸由彼身心不懈退故從夢覺已不見有水彼此岸別非謂無心生死妄想既滅盡已是覺清淨非謂無覺如是法界一切妄想不復生故説為清淨非是諸佛無其實體復次善男子是法身者惑障清淨能現應身業障清淨能現化身智障清淨能現法身譬如依空出電依電出光如是依法身故能現應身依應身故能現化身由性淨故能現法身智慧清淨能現應身三昧清淨能現化身此三清淨是法如如不異如如一味如如解脫如如究竟如如是故諸佛體無有異善男子若有善男子善女人説於如來是我大師若作如是決定信者此人即應深心解了如來之身無有別異善男子以是義故於諸境界不正思惟悉皆除斷即知彼法無有二相亦無分別聖所修行如如於彼無有二相正修行故如是如是一切諸障悉皆除滅如如一切障滅如是如是法如如如如智得最清淨如如法界正智清淨如是如是一切自在具足攝受皆得成就一切諸障悉皆除滅一切諸障得清淨故是名真如正智真實之相如是見者是名聖見是則名為真實見佛何以故如實得見法真如故是故諸佛悉能普見一切如來何以故聲聞獨覺已出三界求真實境不能知見如是聖人所不知見一切凡夫皆生疑惑顛倒分別不能得度如兔浮海必不能過所以者何力微劣故凡夫之人亦復如是不能通達法如如故然諸如來無分別心於一切法得大自在具足清淨深智慧故是自境界不共他故是故諸佛如來於無量無邊阿僧祇劫不惜身命難行苦行方得此身最上無比不可思議過言説境是妙寂靜離諸怖畏善男子如是知見法真如者無生老死壽命無限無有睡眠亦無飢渴心常在定無有散動若於如來起諍論心是則不能見於如來諸佛所説皆能利益有聽聞者無不解脫諸惡禽獸惡人惡鬼不相逢值由聞法故果報無盡然諸如來無無記事一切境界無欲知心生死涅槃無有異想如來所記無不決定諸佛如來四威儀中無非智攝一切諸法無有不為慈悲所攝無有不為利益安樂諸衆生者善男子若有善男子善女人於此金光明經聽聞信解不墮地獄餓鬼傍生阿蘇羅道常處人天不生下賤恆得親近諸佛如來聽受正法常生諸佛清淨國土所以者何由得聞此甚深法故是善男子善女人則為如來已知已記當得不退阿耨多羅三藐三菩提若善男子善女人於此甚深微妙之法一經耳者當知是人不謗如來不毀正法不輕聖衆一切衆生未種善根令得種故已種善根令增長成熟故一切世界所有衆生皆勸修行六波羅蜜多爾時虛空藏菩薩梵釋四王諸天衆等即從座起偏袒右肩合掌恭敬頂禮佛足白佛言世尊若所在處講説如是金光明王微妙經典於其國土有四種利益何者為四一者國王軍衆強盛無諸怨敵離於疾病壽命延長吉祥安樂正法興顯二者中宮妃后王子諸臣和悅無諍離於諂佞王所愛重三者沙門婆羅門及諸國人修行正法無病安樂無抂死者於諸福田悉皆修立四者於三時中四大調適常為諸天增加守護慈悲平等無傷害心令諸衆生歸敬三寶皆願修習菩提之行是為四種利益之事世尊我等亦常為弘經故隨逐如是持經之人所在住處為作利益佛言善哉善哉善男子如是如是汝等應當勤心流布此妙經王則令正法久住於世金光明最勝王經夢見金鼓懺悔品第四爾時妙幢菩薩親於佛前聞妙法已歡喜踊躍一心思惟還至本處於夜夢中見大金鼓光明晃耀猶如日輪於此光中得見十方無量諸佛於寶樹下坐琉璃座無量百千大衆圍繞而為説法見一婆羅門桴擊金鼓出大音聲聲中演説微妙伽他明懺悔法妙幢聞已皆悉憶持繫念而住至天曉已與無量百千大衆圍繞將諸供具出王舍城詣鷲峯山至世尊所禮佛足已布設香花右繞三匝退坐一面合掌恭敬瞻仰尊顏白佛言世尊我於夢中見婆羅門以手執桴擊妙金鼓出大音聲聲中演説微妙伽他明懺悔法我皆憶持惟願世尊降大慈悲聽我所説即於佛前而説頌曰我於昨夜中夢見大金鼓其形極姝妙周遍有金光猶如盛日輪光明皆普耀充滿十方界咸見於諸佛在於寶樹下各處琉璃座無量百千衆恭敬而圍繞有一婆羅門以桴擊金鼓於其鼓聲內説此妙伽他金光明鼓出妙聲遍至三千大千界能滅三塗極重罪及以人中諸苦厄由此金鼓聲威力永滅一切煩惱障斷除怖畏令安隱譬如自在牟尼尊佛於生死大海中積行修成一切智能令衆生覺品具究竟咸歸功德海由此金鼓出妙聲普令聞者獲梵響證得無上菩提果常轉清淨妙法輪住壽不可思議劫隨機説法利群生能斷煩惱衆苦流貪瞋癡等皆除滅若有衆生處惡趣大火猛焰周遍身若得聞是妙鼓音即能離苦歸依佛皆得成就宿命智能憶過去百千生悉皆正念牟尼尊得聞如來甚深教由聞金鼓勝妙音常得親近於諸佛悉能捨離諸惡業純修清淨諸善品一切天人有情類殷重至誠祈願者得聞金鼓妙音聲能令所求皆滿足衆生墮在無間獄猛火炎熾苦焚身無有救護處輪回聞者能令苦除滅人天餓鬼傍生中所有現受諸苦難得聞金鼓發妙響皆蒙離苦得解脫現在十方界常住兩足尊願以大悲心哀愍憶念我衆生無歸依亦無有救護為如是等類能作大歸依我先所作罪極重諸惡業今對十力前至心皆懺悔我不信諸佛亦不敬尊親不務修衆善常造諸惡業或自恃尊高種姓及財位盛年行放逸常造諸惡業心恆起邪念口陳於惡言不見於過罪常造諸惡業恆作愚夫行無明暗覆心隨順不善友常造諸惡業或因諸戲樂或復懷憂惱為貪瞋所纏故我造諸惡親近不善人及由慳嫉意貧窮行諂誑故我造諸惡雖不樂衆過由有怖畏故及不得自在故我造諸惡或為躁動心或因瞋恚恨及以飢渴惱故我造諸惡由飲食衣服及貪愛女人煩惱火所燒故我造諸惡於佛法僧衆不生恭敬心作如是衆罪我今悉懺悔於獨覺菩薩亦無恭敬心作如是衆罪我今悉懺悔無知謗正法不孝於父母作如是衆罪我今悉懺悔由愚癡憍慢及以貪瞋力作如是衆罪我今悉懺悔我於十方界供養無數佛當願拔衆生令離諸苦難願一切有情皆令住十地福智圓滿已成佛導群迷我為諸衆生苦行百千劫以大智慧力皆令出苦海我為諸含識演説甚深經最勝金光明能除諸惡業若人百千劫造諸極重罪暫時能發露衆惡盡消除依此金光明作如是懺悔由斯能速盡一切諸苦業勝定百千種不思議總持根力覺道支修習常無倦我當至十地具足珍寶處圓滿佛功德濟渡生死流我於諸佛海甚深功德藏妙智難思議皆令得具足唯願十方佛觀察護念我皆以大悲心哀受我懺悔我於多劫中所造諸惡業由斯生苦惱哀愍願消除我造諸惡業常生憂怖心於四威儀中曾無歡樂想諸佛具大悲能除衆生怖願受我懺悔令得離憂苦我有煩惱障及以諸報業願以大悲水洗濯令清淨我先作諸罪及現造惡業至心皆發露咸願得蠲除未來諸惡業防護令不起設令有違者終不敢覆藏身三語四種意業復有三繫縛諸有情無始恆相續由斯三種行造作十惡業如是衆多罪我今皆懺悔我造諸惡業苦報當自受今於諸佛前至誠皆懺悔於此贍部洲及他方世界所有諸善業今我皆隨喜願離十惡業修行十善道安住十地中常見十方佛我以身語意所修福智業願以此善根速成無上慧我今親對十力前發露衆多苦難事凡愚迷惑三有難恆造極重惡業難我所積集欲邪難常起貪愛流轉難於此世間耽著難一切愚夫煩惱難狂心散動顛倒難及以親近惡友難於生死中貪染難瞋癡暗鈍造罪難生八無暇惡處難未曾積集功德難我今皆於最勝前懺悔無邊罪惡業我今歸依諸善逝我禮德海無上尊如大金山照十方唯願慈悲哀攝受身色金光淨無垢目如清淨紺琉璃吉祥威德名稱尊大悲慧日除衆暗佛日光明常普遍善淨無垢離諸塵牟尼月照極清涼能除衆生煩惱熱三十二相遍莊嚴八十隨好皆圓滿福德難思無與等如日流光照世間色如琉璃淨無垢猶如滿月處虛空妙頗梨網映金軀種種光明以嚴飾於生死苦瀑流內老病憂愁水所漂如是苦海難堪忍佛日舒光令永竭我今稽首一切智三千世界希有尊光明晃耀紫金身種種妙好皆嚴飾如大海水量難知大地微塵不可數如妙高山叵稱量亦如虛空無有際諸佛功德亦如是一切有情不能知於無量劫諦思惟無有能知德海岸盡此大地諸山嶽析如微塵能算知毛端渧海尚可量佛之功德無能數一切有情皆共讚世尊名稱諸功德清淨相好妙莊嚴不可稱量知分齊我之所有衆善業願得速成無上尊廣説正法利群生悉令解脫於衆苦降伏大力魔軍衆當轉無上正法輪久住劫數難思議充足衆生甘露味猶如過去諸最勝六波羅蜜皆圓滿滅諸貪欲及瞋癡降伏煩惱除衆苦願我常得宿命智能憶過去百千生亦常憶念牟尼尊得聞諸佛甚深法願我以斯諸善業奉事無邊最勝尊遠離一切不善因恆得修行真妙法一切世界諸衆生悉皆離苦得安樂所有諸根不具足令彼身相皆圓滿若有衆生遭病苦身形羸瘦無所依咸令病苦得消除諸根色力皆充滿若犯王法當刑戮衆苦逼迫生憂惱彼受如斯極苦時無有歸依能救護若受鞭杖枷鎖繫種種苦具切其身無量百千憂惱時逼迫身心無暫樂皆令得免於繫縛及以鞭杖苦楚事將臨刑者得命全衆苦皆令永除盡若有衆生飢渴逼令得種種殊勝味盲者得視聾者聞跛者能行啞能語貧窮衆生獲寶藏倉庫盈溢無所乏皆令得受上妙樂無一衆生受苦惱一切人天皆樂見容儀溫雅甚端嚴悉皆現受無量樂受用豐饒福德具隨彼衆生念伎樂衆妙音聲皆現前念水即現清涼池金色蓮花泛其上隨彼衆生心所念飲食衣服及床敷金銀珍寶妙琉璃瓔珞莊嚴皆具足勿令衆生聞惡響亦復不見有相違所受容貌悉端嚴各各慈心相愛樂世間資生諸樂具隨心念時皆滿足所得珍財無吝惜分布施與諸衆生燒香末香及塗香衆妙雜花非一色每日三時從樹墮隨心受用生歡喜普願衆生咸供養十方一切最勝尊三乘清淨妙法門菩薩獨覺聲聞衆常願勿處於卑賤不墮無暇八難中生在有暇人中尊恆得親承十方佛願得常生富貴家財寶倉庫皆盈滿顏貌名稱無與等壽命延長經劫數悉願女人變為男勇健聰明多智慧一切常行菩薩道勤修六度到彼岸常見十方無量佛寶王樹下而安處處妙琉璃師子座恆得親承轉法輪若於過去及現在輪回三有造諸業能招可厭不善趣願得消滅永無餘一切衆生於有海生死羂網堅牢縛願以智劍為斷除離苦速證菩提處衆生於此贍部內或於他方世界中所作種種勝福因我今皆悉生隨喜以此隨喜福德事及身語意造衆善願此勝業常增長速證無上大菩提所有禮讚佛功德深心清淨無瑕穢回向發願福無邊當超惡趣六十劫若有男子及女人婆羅門等諸勝族合掌一心讚歎佛生生常憶宿世事諸根清淨身圓滿殊勝功德皆成就願於未來所生處常得人天共瞻仰非於一佛十佛所修諸善根今得聞百千佛所種善根方得聞斯懺悔法爾時世尊聞此説已讚妙幢菩薩言善哉善哉善男子如汝所夢金鼓出聲讚歎如來真實功德并懺悔法若有聞者獲福甚多廣利有情滅除罪障汝今應知此之勝業皆是過去讚歎發願宿習因緣及由諸佛威力加護此之因緣當為汝説時諸大衆聞是法已咸皆歡喜信受奉行
