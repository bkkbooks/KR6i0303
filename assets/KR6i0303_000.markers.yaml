  - {type: variant, offset: 0, length: 1456, content: 大唐龍興三藏聖教序大唐龍興三藏聖教序中宗孝皇帝製蓋聞蒼蒼者天，列星辰而著象；茫茫者地，奠川嶽以成形。仰觀天文，既如彼也，俯循地理，又若斯焉。夫以妙旨幽微，名言之路攸絕；真如湛寂，性相之義都捐。然則發啟心聾，資法雷之激響；獎導迷眾，俟覺首以司方。故知假名不壞於常名，樂說乃詮於無說。至若象外之象，獨稱三界之尊；天中之天，爰著六通之聖。法王利見，孕育於七十二君；梵帝乘時，牢籠於萬八千歲。周星閱彩，言符降誕之徵；漢日流祥，載叶通神之夢。故能威揚沙劫，化被塵區，玉毫舒耀而除昏，金口弘宣而遣滯。破煩惱之賊，詎藉干戈？壞生死之軍，惟憑慧力。闢圓明之界，廣納於無邊；開常樂之門，普該於有識。縱使浮天欲浪，境風息而俄澄；漲日情塵，法雨霑而便廓。歸依者，銷殃而致福；迴向者，去危而獲安。可謂巍巍乎其有神功，蕩蕩乎而無能名者矣！但四生蠢蠢，未悟無常；六趣悠悠，俱纏有結。詎知空華不實，水月非堅！馳逐於五陰之中，播遷於三界之域，納諸品彙，終俟法門。自白馬西來，玄言東被，世尊則隨類敷演，眾生乃逐性開迷。馬鳴擅美於瓊編，龍樹騰芳於寶偈。於是遙通震旦，遠布閻浮。半滿之教區分，大小之乘並騖。澄安俊德，接武於譯場；林遠高人，駢踪於法宇。遂使微言著範，歷千古而暢英聲；至𦣱流規，周十方而騰茂實。頃屬後周膺運，大扇魔風，遂使天下招提咸從毀廢，寰中法侶並混編甿。嗟乎！閴寂禪居，空留宴坐之處；荒凉慧苑，無復經行之蹤。爰洎開皇，重將修建，旋逢大業，又遇分崩。鬼哭神吟，山鳴海沸，既遭塗炭，寧有伽藍？正法消淪，邪見增長，於是人迷覺路，邅迴於苦集之區，俗蔽真宗，覇絆於蓋纏之內。我大唐之有天下也，上凌巢燧，俯視義軒，三聖重光，萬邦一統。威加有截，澤被無垠，掩坤絡以還淳，亘乾維而獻款。再懸佛日，重補梵天。龍宮將八柱齊安，鷲嶺共五峯爭峻。大弘釋教，諒屬皇朝者焉。大福先寺翻經三藏法師義淨者，范陽人也，俗姓張氏。五代相韓之後，三台仕晉之前，朱紫分輝，貂蟬合彩。高祖為東齊郡守，仁風遠扇，甘雨隨車，化闡六條，政行十部。爰祖及父俱厭俗榮，放曠一丘，逍遙三徑。含和體素，養志恬神，摘芝秀於東山，挹清流於南澗。可謂尋幽丹嘺，棲偃白雲。皐鶴於是吞聲，場駒以之縶影。法師幼挻明晤，夙彰聰敏。纔踰辯李之歲，心樂出家；甫過遊洛之年，志尋西國。業該經史，學洞古今，總三藏之玄樞，明一乘之奧義。既而閑居習靜，息慮安禪，託彼山林，遠玆塵累。三十有七，方遂雅懷。以咸亨二年行至廣府，發蹤結契，數乃十人，鼓櫂昇航，惟存一已。巡南溟以遐逝，指西域以長驅；歷巖岫之千重，凌波濤之萬里。漸屆天竺，次至王城。佛說《法華》，靈峯尚在；如來成道，聖躅仍留。吠舍城中，獻蓋之蹤不泯；給狐園內，布金之地猶存。三道寶階，居然目覩；八大靈塔，邈矣親觀。所經三十餘國，凡歷二十餘載。菩提樹下，屢攀折以淹留；阿耨池邊，幾濯纓而藻鑒。法師慈悲作室，忍辱為衣，長齋則一食自資，長坐則六時無倦。又古來翻譯之者，莫不先出梵文，後資漢譯。摭詞方憑於學者，銓義別稟於僧徒。今玆法師不如是矣！既閑五天竺語，又詳二諦幽宗。譯義綴文，咸由於已出；指詞定理，匪假於旁求。超漢代之摩騰，跨秦年之羅什。所將梵本經僅四百部，合五十萬頌，金剛座真容一舖，舍利三百粒，以證聖元年夏五月方屆都焉。則天大聖皇帝出震膺期，乘乾握紀，紹隆為務，弘濟為心，爰命百寮，兼整四眾，虹幡㨹日，鳳吹遏雲，香散六銖，華飄五色，鏘鏘濟濟，煒煒煌煌，迎于上東之門，置于授記之寺。共于闐三藏及大福先寺主沙門復禮、西崇福寺主法藏等翻《華嚴經》，後至大福先寺，與天竺三藏寶思末多及授記寺主惠表沙門勝莊、慈訓等譯《根本部律》。其大德等，莫不四禪凝慮，六度冥懷，懸法鏡於心臺，朗戒珠於性海。詞林挻秀，將覺樹而聯芳；慧炬揚輝，澄桂輪而合影。渾金𤩶玉，諒屬其人，誠梵宇之棟梁，實法門之龍象。已翻諸雜經律二百餘卷，繕寫云畢，尋並進內。其余戒律諸論，方俟後詮。五篇之教具明，八法之因備曉。鵞珠尚護，蟲命無傷，浮囊必取於不虧，油鉢終期於靡覆。崇聖教之紀綱，啟含生之耳目。伏願上資先聖，長隆七廟之基，下逮微躬，恒佐九天之命，遷懷生於壽域，致薄俗於淳源，歲稔時和，遠安邇肅。顧以萬機務總，四海事殷，爰憑乙夜之余，式賛彌天之德，課虛扣寂，聊題序云。, 大: ''}
