front:
  text: 大唐龍興三藏聖教序中宗孝皇帝製蓋聞蒼蒼者天列星辰而著象茫茫者地奠川嶽以成形仰觀天文既如彼也俯循地理又若斯焉夫以妙旨幽微名言之路攸絶真如湛寂性相之義都捐然則發啓心聾資法雷之激響獎導迷衆俟覺首以司方故知假名不壞於常名樂說乃詮於無說至若象外之象獨稱三界之尊天中之天爰著六通之聖法王利見孕育於七十二君梵帝乘時牢籠於萬八千歲周星閲彩言符降誕之徵漢日流祥載叶通神之夢故能威揚沙劫化被塵區玉毫舒耀而除昏金口弘宣而遣滯破煩惱之賊詎藉干戈壞生死之軍惟憑慧力闢圓明之界廣納於無邊開常樂之門普該於有識縱使浮天欲浪境風息而俄澄漲日情塵法雨霑而便廓歸依者銷殃而致福回向者去危而獲安可謂巍巍乎其有神功蕩蕩乎而無能名者矣但四生蠢蠢未悟無常六趣悠悠俱纏有結詎知空華不實水月非堅馳逐於五陰之中播遷於三界之域納諸品彙終俟法門自白馬西來玄言東被世尊則隨類敷演衆生乃逐性開迷馬鳴擅美於瓊編龍樹騰芳於寶偈於是遙通震旦遠布閻浮半滿之教區分大小之乘並騖澄安俊德接武於譯場林遠高人駢踪於法宇遂使微言著範歷千古而暢英聲至𦣱流規周十方而騰茂實頃屬後周膺運大扇魔風遂使天下招提咸從毀廢寰中法侶並混編氓嗟乎閴寂禪居空留宴坐之處荒凉慧苑無復經行之蹤爰洎開皇重將修建旋逢大業又遇分崩鬼哭神吟山鳴海沸既遭塗炭寧有伽藍正法消淪邪見增長於是人迷覺路邅回於苦集之區俗蔽真宗霸絆於蓋纏之內我大唐之有天下也上凌巢燧俯視義軒三聖重光萬邦一統威加有截澤被無垠掩坤絡以還淳亘乾維而獻款再懸佛日重補梵天龍宮將八柱齊安鷲嶺共五峯爭峻大弘釋教諒屬皇朝者焉大福先寺翻經三藏法師義淨者范陽人也俗姓張氏五代相韓之後三台仕晉之前朱紫分輝貂蟬合彩高祖為東齊郡守仁風遠扇甘雨隨車化闡六條政行十部爰祖及父俱厭俗榮放曠一丘逍遙三徑含和體素養志恬神摘芝秀於東山挹清流於南澗可謂尋幽丹嘺棲偃白雲皋鶴於是吞聲場駒以之縶影法師幼挻明晤夙彰聰敏才踰辨李之歲心樂出家甫過遊洛之年志尋西國業該經史學洞古今總三藏之玄樞明一乘之奧義既而間居習靜息慮安禪託彼山林遠茲塵纍三十有七方遂雅懷以咸亨二年行至廣府發蹤結契數乃十人鼓櫂升航惟存一已巡南溟以遐逝指西域以長驅歷巖岫之千重凌波濤之萬里漸屆天竺次至王城佛說法華靈峯尚在如來成道聖躅仍留吠舍城中獻蓋之蹤不泯給狐園內布金之地猶存三道寶階居然目覩八大靈塔邈矣親觀所經三十餘國凡歷二十餘載菩提樹下屢攀折以淹留阿耨池邊幾濯纓而藻鑒法師慈悲作室忍辱為衣長齊則一食自資長坐則六時無倦又古來翻譯之者莫不先出梵文後資漢譯托詞方憑於學者銓義別稟於僧徒今茲法師不如是矣既間五天竺語又詳二諦幽宗譯義綴文咸由於已出指詞定理匪假於旁求超漢代之摩騰跨秦年之羅什所將梵本經僅四百部合五十萬頌金剛座真容一鋪舍利三百粒以證聖元年夏五月方屆都焉則天大聖皇帝出震膺期乘乾握紀紹隆為務弘濟為心爰命百寮兼整四衆虹幡㨹日鳳吹遏雲香散六銖華飄五色鏘鏘濟濟煒煒煌煌迎于上東之門置于授記之寺共于闐三藏及大福先寺主沙門復禮西崇福寺主法藏等翻華嚴經後至大福先寺與天竺三藏寶思末多及授記寺主惠表沙門勝莊慈訓等譯根本部律其大德等莫不四禪凝慮六度冥懷懸法鏡於心臺朗戒珠於性海詞林挻秀將覺樹而聯芳慧炬揚輝澄桂輪而合影渾金𤩶玉諒屬其人誠梵宇之棟梁實法門之龍象已翻諸雜經律二百餘卷繕寫云畢尋並進內其余戒律諸論方俟後詮五篇之教具明八法之因備曉鵝珠尚護蟲命無傷浮囊必取於不虧油鉢終期於靡覆崇聖教之紀綱啓含生之耳目伏願上資先聖長隆七廟之基下逮微躬恆佐九天之命遷懷生於壽域致薄俗於淳源歲稔時和遠安邇肅顧以萬機務總四海事殷爰憑乙夜之余式贊彌天之德課虛扣寂聊題序云
